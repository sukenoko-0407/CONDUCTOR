[project]
name = "rdkit-ligand-descriptor-agent"
version = "0.1.0"
description = "RDKit ligand-only descriptor and fingerprint CSV generator"
requires-python = ">=3.10"
dependencies = [
  "pandas>=2.2",
  "pyyaml>=6.0",
  "rdkit>=2025.9",
]

[dependency-groups]
dev = [
  "pytest>=8.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
